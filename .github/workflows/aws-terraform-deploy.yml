name: AWS Terraform — Deploy DEV

on:
  push:
    branches:
      - main
    paths:
      - 'aws/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.7.0'
  WORKING_DIR: aws
  AWS_REGION: us-east-1

jobs:
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.WORKING_DIR }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: |
          terraform init \
            -backend-config="key=aws/dev.terraform.tfstate"
        working-directory: ${{ env.WORKING_DIR }}

      - name: terraform validate
        run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

      - name: tflint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          tflint --init
          tflint --recursive
        working-directory: ${{ env.WORKING_DIR }}

      - name: checkov security scan
        run: |
          pip install checkov --quiet
          checkov -d . --framework terraform --quiet --compact
        working-directory: ${{ env.WORKING_DIR }}

  plan-dev:
    name: Plan — DEV
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: |
          terraform init \
            -backend-config="key=aws/dev.terraform.tfstate"
        working-directory: ${{ env.WORKING_DIR }}

      - name: terraform plan
        run: terraform plan -var-file="dev.tfvars" -out=dev.tfplan
        working-directory: ${{ env.WORKING_DIR }}

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: aws-dev-tfplan
          path: ${{ env.WORKING_DIR }}/dev.tfplan
          retention-days: 1

  apply-dev:
    name: Apply — DEV
    runs-on: ubuntu-latest
    needs: plan-dev
    environment: aws-dev  # Add required reviewers in GitHub → Settings → Environments → aws-dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: aws-dev-tfplan
          path: ${{ env.WORKING_DIR }}

      - name: terraform init
        run: |
          terraform init \
            -backend-config="key=aws/dev.terraform.tfstate"
        working-directory: ${{ env.WORKING_DIR }}

      - name: terraform apply
        run: terraform apply -auto-approve dev.tfplan
        working-directory: ${{ env.WORKING_DIR }}
