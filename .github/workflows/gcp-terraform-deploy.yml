name: GCP Terraform — Deploy DEV

on:
  push:
    branches:
      - main
    paths:
      - 'gcp/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.7.0'
  WORKING_DIR: gcp

jobs:
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.WORKING_DIR }}

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_PIPELINE_SA }}

      - name: terraform init
        run: terraform init -backend-config="prefix=gcp/dev"
        working-directory: ${{ env.WORKING_DIR }}

      - name: terraform validate
        run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.53.0

      - name: tflint
        run: |
          tflint --init
          tflint --recursive
        working-directory: ${{ env.WORKING_DIR }}

      - name: checkov security scan
        run: |
          pip install checkov==3.2.0 --quiet
          checkov -d . --framework terraform --quiet --compact
        working-directory: ${{ env.WORKING_DIR }}

  plan-dev:
    name: Plan — DEV
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_PIPELINE_SA }}

      - name: terraform init
        run: terraform init -backend-config="prefix=gcp/dev"
        working-directory: ${{ env.WORKING_DIR }}

      - name: terraform plan
        run: terraform plan -var-file="dev.tfvars" -out=dev.tfplan
        working-directory: ${{ env.WORKING_DIR }}

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: gcp-dev-tfplan
          path: ${{ env.WORKING_DIR }}/dev.tfplan
          retention-days: 1

  apply-dev:
    name: Apply — DEV
    runs-on: ubuntu-latest
    needs: plan-dev
    environment: gcp-dev  # Add required reviewers in GitHub → Settings → Environments → gcp-dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_PIPELINE_SA }}

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: gcp-dev-tfplan
          path: ${{ env.WORKING_DIR }}

      - name: terraform init
        run: terraform init -backend-config="prefix=gcp/dev"
        working-directory: ${{ env.WORKING_DIR }}

      - name: terraform apply
        run: terraform apply -auto-approve dev.tfplan
        working-directory: ${{ env.WORKING_DIR }}
