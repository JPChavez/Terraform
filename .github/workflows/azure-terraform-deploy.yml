name: Azure Terraform — Deploy DEV

on:
  push:
    branches:
      - main
    paths:
      - 'azure/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.7.0'
  WORKING_DIR: azure
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: 'true'

jobs:
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.WORKING_DIR }}

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: terraform init
        run: terraform init -backend-config="key=azure/dev.terraform.tfstate"
        working-directory: ${{ env.WORKING_DIR }}

      - name: terraform validate
        run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

      - name: tflint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          tflint --init
          tflint --recursive
        working-directory: ${{ env.WORKING_DIR }}

      - name: checkov security scan
        run: |
          pip install checkov --quiet
          checkov -d . --framework terraform --quiet --compact
        working-directory: ${{ env.WORKING_DIR }}

  plan-dev:
    name: Plan — DEV
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: terraform init
        run: terraform init -backend-config="key=azure/dev.terraform.tfstate"
        working-directory: ${{ env.WORKING_DIR }}

      - name: terraform plan
        run: terraform plan -var-file="dev.tfvars" -out=dev.tfplan
        working-directory: ${{ env.WORKING_DIR }}

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: azure-dev-tfplan
          path: ${{ env.WORKING_DIR }}/dev.tfplan
          retention-days: 1

  apply-dev:
    name: Apply — DEV
    runs-on: ubuntu-latest
    needs: plan-dev
    environment: dev  # Add required reviewers in GitHub → Settings → Environments → dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: azure-dev-tfplan
          path: ${{ env.WORKING_DIR }}

      - name: terraform init
        run: terraform init -backend-config="key=azure/dev.terraform.tfstate"
        working-directory: ${{ env.WORKING_DIR }}

      - name: terraform apply
        run: terraform apply -auto-approve dev.tfplan
        working-directory: ${{ env.WORKING_DIR }}
