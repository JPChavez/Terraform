name: Azure Terraform — PR Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'azure/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: '1.7.0'
  WORKING_DIR: azure
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: 'true'

jobs:
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.WORKING_DIR }}

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: terraform init
        run: terraform init -backend-config="key=azure/dev.terraform.tfstate"
        working-directory: ${{ env.WORKING_DIR }}

      - name: terraform validate
        run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.53.0

      - name: tflint
        run: |
          tflint --init
          tflint --recursive
        working-directory: ${{ env.WORKING_DIR }}

      - name: checkov security scan
        run: |
          pip install checkov==3.2.0 --quiet
          checkov -d . --framework terraform --quiet --compact
        working-directory: ${{ env.WORKING_DIR }}

  plan-dev:
    name: Plan — DEV
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: terraform init
        run: terraform init -backend-config="key=azure/dev.terraform.tfstate"
        working-directory: ${{ env.WORKING_DIR }}

      - name: terraform plan
        id: plan
        run: terraform plan -var-file="dev.tfvars" -no-color 2>&1 | tee plan_output.txt
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... [truncated — see full output in Actions run]'
              : plan;
            const body = [
              '## Terraform Plan — DEV (Azure)',
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```hcl',
              truncated,
              '```',
              '</details>',
              '',
              `**Result:** ${{ steps.plan.outcome == 'success' && '✅ Plan succeeded' || '❌ Plan failed' }}`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Add plan to step summary
        run: |
          echo "### Terraform Plan — DEV (Azure)" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY
          cat ${{ env.WORKING_DIR }}/plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
