              }
              EOF
              echo "##vso[task.setvariable variable=GOOGLE_APPLICATION_CREDENTIALS;]/tmp/gcp_wif_creds.json"
            displayName: 'Configure GCP WIF credentials (uat)'

          - script: terraform plan -var-file="uat.tfvars" -out=uat.tfplan
            displayName: 'terraform plan (uat)'
