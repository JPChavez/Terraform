              artifact: 'gcp-uat-tfplan'

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 6: Approval UAT
  # ─────────────────────────────────────────────────────────────────────────────
  - stage: ApprovalUat
    displayName: 'Approval - UAT'
    dependsOn: PlanUat
    condition: succeeded()
    jobs:
      - job: WaitForApproval
        displayName: 'Waiting for approval to deploy UAT'
        pool: server
        timeoutInMinutes: '1440'
        steps:
          - task: ManualValidation@0
            displayName: 'Approve UAT deployment'
            inputs:
              notifyUsers: $(approverEmail)
              instructions: |
                Please review the Terraform plan for UAT (GCP) before approving.

                Environment  : UAT
                Branch       : $(Build.SourceBranch)
                Requested by : $(Build.RequestedFor)

                Approval URL : $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)&view=results

