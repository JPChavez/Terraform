trigger:
  branches:
    include:
      - main
  paths:
    include:
      - '**/*.tf'
      - '**/*.tfvars'

pr:
  branches:
    include:
      - main
  paths:
    include:
      - '**/*.tf'
      - '**/*.tfvars'

variables:
  terraformVersion: '1.7.0'
  serviceConnection: 'azure-service-connection'        # Update with your Azure DevOps service connection name
  backendResourceGroup: 'rg-tfstate-jproject'
  backendStorageAccount: 'stjprojecttfstate'
  backendContainer: 'tfstate'
  workingDirectory: '$(System.DefaultWorkingDirectory)'
  approverEmail: 'jpableras.azure@gmail.com'           # Juan Pablo Chavez

stages:

  # ─────────────────────────────────────────────
  # STAGE 1: Validate & Lint
  # ─────────────────────────────────────────────
  - stage: Validate
    displayName: 'Validate & Lint'
    jobs:
      - job: Validate
        displayName: 'terraform fmt · validate · tflint · checkov'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: TerraformInstaller@1
            displayName: 'Install Terraform $(terraformVersion)'
            inputs:
              terraformVersion: $(terraformVersion)

          - script: |
              terraform fmt -check -recursive
            displayName: 'terraform fmt check'
            workingDirectory: $(workingDirectory)

          - task: TerraformTaskV4@4
            displayName: 'terraform init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: $(workingDirectory)
              backendServiceArm: $(serviceConnection)
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: 'dev.terraform.tfstate'

          - task: TerraformTaskV4@4
            displayName: 'terraform validate'
            inputs:
              provider: 'azurerm'
              command: 'validate'
              workingDirectory: $(workingDirectory)

          - script: |
              curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
              tflint --init
              tflint --recursive
            displayName: 'tflint'
            workingDirectory: $(workingDirectory)

          - script: |
              pip install checkov --quiet
              checkov -d . --framework terraform --quiet --compact
            displayName: 'checkov security scan'
            workingDirectory: $(workingDirectory)

  # ─────────────────────────────────────────────
  # STAGE 2: Plan DEV
  # ─────────────────────────────────────────────
  - stage: PlanDev
    displayName: 'Plan - DEV'
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: PlanDev
        displayName: 'terraform plan (dev)'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: TerraformInstaller@1
            displayName: 'Install Terraform $(terraformVersion)'
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV4@4
            displayName: 'terraform init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: $(workingDirectory)
              backendServiceArm: $(serviceConnection)
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: 'dev.terraform.tfstate'

          - task: TerraformTaskV4@4
            displayName: 'terraform plan (dev)'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: $(workingDirectory)
              commandOptions: '-var-file="dev.tfvars" -out=dev.tfplan'
              environmentServiceNameAzureRM: $(serviceConnection)

          - task: PublishPipelineArtifact@1
            displayName: 'Publish dev plan'
            inputs:
              targetPath: '$(workingDirectory)/dev.tfplan'
              artifact: 'dev-tfplan'

  # ─────────────────────────────────────────────
  # STAGE 3: Approval DEV — Juan Pablo Chavez
  # ─────────────────────────────────────────────
  - stage: ApprovalDev
    displayName: 'Approval - DEV'
    dependsOn: PlanDev
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: WaitForApproval
        displayName: 'Waiting for approval to deploy DEV'
        pool: server
        timeoutInMinutes: '1440'                           # 24-hour approval window
        steps:
          - task: ManualValidation@0
            displayName: 'Approve DEV deployment'
            inputs:
              notifyUsers: $(approverEmail)
              instructions: |
                Please review the Terraform plan for DEV before approving.

                Environment : DEV
                Branch      : $(Build.SourceBranch)
                Requested by: $(Build.RequestedFor)

                Approval URL: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)&view=results

                Review the plan artifact in this pipeline run, then approve or reject.
              onTimeout: 'reject'

  # ─────────────────────────────────────────────
  # STAGE 4: Apply DEV
  # ─────────────────────────────────────────────
  - stage: ApplyDev
    displayName: 'Apply - DEV'
    dependsOn: ApprovalDev
    condition: succeeded()
    jobs:
      - deployment: ApplyDev
        displayName: 'terraform apply (dev)'
        pool:
          vmImage: ubuntu-latest
        environment: 'dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: TerraformInstaller@1
                  displayName: 'Install Terraform $(terraformVersion)'
                  inputs:
                    terraformVersion: $(terraformVersion)

                - task: DownloadPipelineArtifact@2
                  displayName: 'Download dev plan'
                  inputs:
                    artifact: 'dev-tfplan'
                    path: $(workingDirectory)

                - task: TerraformTaskV4@4
                  displayName: 'terraform init'
                  inputs:
                    provider: 'azurerm'
                    command: 'init'
                    workingDirectory: $(workingDirectory)
                    backendServiceArm: $(serviceConnection)
                    backendAzureRmResourceGroupName: $(backendResourceGroup)
                    backendAzureRmStorageAccountName: $(backendStorageAccount)
                    backendAzureRmContainerName: $(backendContainer)
                    backendAzureRmKey: 'dev.terraform.tfstate'

                - task: TerraformTaskV4@4
                  displayName: 'terraform apply (dev)'
                  inputs:
                    provider: 'azurerm'
                    command: 'apply'
                    workingDirectory: $(workingDirectory)
                    commandOptions: 'dev.tfplan'
                    environmentServiceNameAzureRM: $(serviceConnection)

  # ─────────────────────────────────────────────
  # STAGE 5: Plan UAT
  # ─────────────────────────────────────────────
  - stage: PlanUat
    displayName: 'Plan - UAT'
    dependsOn: ApplyDev
    condition: succeeded()
    jobs:
      - job: PlanUat
        displayName: 'terraform plan (uat)'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: TerraformInstaller@1
            displayName: 'Install Terraform $(terraformVersion)'
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV4@4
            displayName: 'terraform init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: $(workingDirectory)
              backendServiceArm: $(serviceConnection)
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: 'uat.terraform.tfstate'

          - task: TerraformTaskV4@4
            displayName: 'terraform plan (uat)'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: $(workingDirectory)
              commandOptions: '-var-file="uat.tfvars" -out=uat.tfplan'
              environmentServiceNameAzureRM: $(serviceConnection)

          - task: PublishPipelineArtifact@1
            displayName: 'Publish uat plan'
            inputs:
              targetPath: '$(workingDirectory)/uat.tfplan'
              artifact: 'uat-tfplan'

  # ─────────────────────────────────────────────
  # STAGE 6: Approval UAT — Juan Pablo Chavez
  # ─────────────────────────────────────────────
  - stage: ApprovalUat
    displayName: 'Approval - UAT'
    dependsOn: PlanUat
    condition: succeeded()
    jobs:
      - job: WaitForApproval
        displayName: 'Waiting for approval to deploy UAT'
        pool: server
        timeoutInMinutes: '1440'
        steps:
          - task: ManualValidation@0
            displayName: 'Approve UAT deployment'
            inputs:
              notifyUsers: $(approverEmail)
              instructions: |
                Please review the Terraform plan for UAT before approving.

                Environment : UAT
                Branch      : $(Build.SourceBranch)
                Requested by: $(Build.RequestedFor)

                Approval URL: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)&view=results

                Review the plan artifact in this pipeline run, then approve or reject.
              onTimeout: 'reject'

  # ─────────────────────────────────────────────
  # STAGE 7: Apply UAT
  # ─────────────────────────────────────────────
  - stage: ApplyUat
    displayName: 'Apply - UAT'
    dependsOn: ApprovalUat
    condition: succeeded()
    jobs:
      - deployment: ApplyUat
        displayName: 'terraform apply (uat)'
        pool:
          vmImage: ubuntu-latest
        environment: 'uat'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: TerraformInstaller@1
                  displayName: 'Install Terraform $(terraformVersion)'
                  inputs:
                    terraformVersion: $(terraformVersion)

                - task: DownloadPipelineArtifact@2
                  displayName: 'Download uat plan'
                  inputs:
                    artifact: 'uat-tfplan'
                    path: $(workingDirectory)

                - task: TerraformTaskV4@4
                  displayName: 'terraform init'
                  inputs:
                    provider: 'azurerm'
                    command: 'init'
                    workingDirectory: $(workingDirectory)
                    backendServiceArm: $(serviceConnection)
                    backendAzureRmResourceGroupName: $(backendResourceGroup)
                    backendAzureRmStorageAccountName: $(backendStorageAccount)
                    backendAzureRmContainerName: $(backendContainer)
                    backendAzureRmKey: 'uat.terraform.tfstate'

                - task: TerraformTaskV4@4
                  displayName: 'terraform apply (uat)'
                  inputs:
                    provider: 'azurerm'
                    command: 'apply'
                    workingDirectory: $(workingDirectory)
                    commandOptions: 'uat.tfplan'
                    environmentServiceNameAzureRM: $(serviceConnection)

  # ─────────────────────────────────────────────
  # STAGE 8: Plan PROD
  # ─────────────────────────────────────────────
  - stage: PlanProd
    displayName: 'Plan - PROD'
    dependsOn: ApplyUat
    condition: succeeded()
    jobs:
      - job: PlanProd
        displayName: 'terraform plan (prod)'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: TerraformInstaller@1
            displayName: 'Install Terraform $(terraformVersion)'
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV4@4
            displayName: 'terraform init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: $(workingDirectory)
              backendServiceArm: $(serviceConnection)
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: 'prod.terraform.tfstate'

          - task: TerraformTaskV4@4
            displayName: 'terraform plan (prod)'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: $(workingDirectory)
              commandOptions: '-var-file="prod.tfvars" -out=prod.tfplan'
              environmentServiceNameAzureRM: $(serviceConnection)

          - task: PublishPipelineArtifact@1
            displayName: 'Publish prod plan'
            inputs:
              targetPath: '$(workingDirectory)/prod.tfplan'
              artifact: 'prod-tfplan'

  # ─────────────────────────────────────────────
  # STAGE 9: Approval PROD — Juan Pablo Chavez
  # ─────────────────────────────────────────────
  - stage: ApprovalProd
    displayName: 'Approval - PROD'
    dependsOn: PlanProd
    condition: succeeded()
    jobs:
      - job: WaitForApproval
        displayName: 'Waiting for approval to deploy PROD'
        pool: server
        timeoutInMinutes: '1440'
        steps:
          - task: ManualValidation@0
            displayName: 'Approve PROD deployment'
            inputs:
              notifyUsers: $(approverEmail)
              instructions: |
                Please review the Terraform plan for PROD before approving.

                Environment : PROD
                Branch      : $(Build.SourceBranch)
                Requested by: $(Build.RequestedFor)

                Approval URL: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)&view=results

                ⚠️  This is a PRODUCTION deployment. Review carefully before approving.

                Review the plan artifact in this pipeline run, then approve or reject.
              onTimeout: 'reject'

  # ─────────────────────────────────────────────
  # STAGE 10: Apply PROD
  # ─────────────────────────────────────────────
  - stage: ApplyProd
    displayName: 'Apply - PROD'
    dependsOn: ApprovalProd
    condition: succeeded()
    jobs:
      - deployment: ApplyProd
        displayName: 'terraform apply (prod)'
        pool:
          vmImage: ubuntu-latest
        environment: 'prod'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: TerraformInstaller@1
                  displayName: 'Install Terraform $(terraformVersion)'
                  inputs:
                    terraformVersion: $(terraformVersion)

                - task: DownloadPipelineArtifact@2
                  displayName: 'Download prod plan'
                  inputs:
                    artifact: 'prod-tfplan'
                    path: $(workingDirectory)

                - task: TerraformTaskV4@4
                  displayName: 'terraform init'
                  inputs:
                    provider: 'azurerm'
                    command: 'init'
                    workingDirectory: $(workingDirectory)
                    backendServiceArm: $(serviceConnection)
                    backendAzureRmResourceGroupName: $(backendResourceGroup)
                    backendAzureRmStorageAccountName: $(backendStorageAccount)
                    backendAzureRmContainerName: $(backendContainer)
                    backendAzureRmKey: 'prod.terraform.tfstate'

                - task: TerraformTaskV4@4
                  displayName: 'terraform apply (prod)'
                  inputs:
                    provider: 'azurerm'
                    command: 'apply'
                    workingDirectory: $(workingDirectory)
                    commandOptions: 'prod.tfplan'
                    environmentServiceNameAzureRM: $(serviceConnection)
